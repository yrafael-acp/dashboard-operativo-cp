<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Operativo CP</title>
  <meta name="description" content="Dashboard operativo CP conectado a Google Sheets mediante Apps Script API.">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="./assets/css/app.css">
</head>
<body>
  <div id="loader-overlay" class="d-none">
    <div class="spinner-border text-success" role="status" aria-hidden="true"></div>
    <div class="mt-2 fw-bold text-success">Sincronizando con Cerro Prieto...</div>
  </div>

  <div class="toast-container position-fixed top-0 end-0 p-3" id="toastContainer"></div>

  <nav class="navbar navbar-dark px-3 mb-3">
    <span class="navbar-brand fw-bold">
      <i class="bi bi-cpu-fill me-2"></i>
      <span id="appName">DASHBOARD OPERATIVO CP</span>
    </span>
  </nav>

  <main class="container-fluid px-3 pb-4">
    <ul class="nav nav-pills justify-content-center mb-3" id="mainTabs" role="tablist">
      <li class="nav-item">
        <button class="nav-link active" id="tabResumenBtn" data-bs-toggle="pill" data-bs-target="#view-resumen" type="button" role="tab">RESUMEN</button>
      </li>
      <li class="nav-item ms-2">
        <button class="nav-link" id="tabDetalleBtn" data-bs-toggle="pill" data-bs-target="#view-detalle" type="button" role="tab">DETALLE / EDICIÓN</button>
      </li>
    </ul>

    <div class="tab-content">
      <section class="tab-pane fade show active" id="view-resumen" role="tabpanel">
        <div class="row g-2 mb-3 text-center" id="kpiCards"></div>
        <div class="row g-3">
          <div class="col-lg-4">
            <div class="card card-soft p-3 h-100">
              <div class="chart-wrap"><canvas id="ctxGrafico"></canvas></div>
            </div>
          </div>
          <div class="col-lg-8">
            <div id="resumenZonas" class="card card-soft p-3 h-100"></div>
          </div>
        </div>
      </section>

      <section class="tab-pane fade" id="view-detalle" role="tabpanel">
        <div class="card card-soft p-2 mb-3 bg-white">
          <div class="d-flex flex-wrap gap-2 justify-content-center" id="actionButtons">
            <button class="btn btn-outline-danger btn-sm" data-action="limpiarRangoGeneral"><i class="bi bi-eraser"></i> LIMPIAR A:H</button>
            <button class="btn btn-outline-danger btn-sm" data-action="limpiarConOmisiones" id="btnOmisiones"><i class="bi bi-scissors"></i> LIMPIAR CON OMISIONES</button>
            <button class="btn btn-outline-primary btn-sm" data-action="transferirConsolidadoAEtiquetar"><i class="bi bi-arrow-right-circle"></i> CONSOLIDADO -> ETIQUETAR</button>
            <button class="btn btn-outline-primary btn-sm" data-action="copiarEtiquetasAMasivo"><i class="bi bi-box-arrow-in-down"></i> ETIQUETAR -> MASIVO</button>
            <button class="btn btn-outline-success btn-sm" data-action="generarFormatoEtiqueta"><i class="bi bi-printer"></i> FORMATO ETIQUETA</button>
            <button class="btn btn-outline-dark btn-sm" data-action="actualizarTablasDinamicas"><i class="bi bi-arrow-clockwise"></i> REFRESCAR PIVOTS</button>
            <button class="btn btn-outline-warning btn-sm" data-action="filtrarSinStock"><i class="bi bi-filter-square"></i> FILTRAR SIN STOCK</button>
          </div>
        </div>

        <div class="card card-soft p-3 bg-white">
          <div class="row g-2 mb-3 align-items-end">
            <div class="col-md-3">
              <label class="form-label small fw-bold mb-1" for="selectorHoja">HOJA SELECCIONADA:</label>
              <select class="form-select form-select-sm" id="selectorHoja"></select>
            </div>
            <div class="col-md-4">
              <label class="form-label small fw-bold mb-1 visually-hidden" for="searchInput">Buscar</label>
              <input type="text" id="searchInput" class="form-control form-control-sm" placeholder="Buscar en esta hoja...">
            </div>
            <div class="col-md-5 d-flex gap-2">
              <button class="btn btn-sm btn-dark" id="btnReset">RESET</button>
              <button class="btn btn-sm btn-success d-none" id="btnNuevaFila"><i class="bi bi-plus-lg"></i> NUEVA FILA</button>
              <button class="btn btn-sm btn-outline-secondary ms-auto" id="btnRecargar"><i class="bi bi-arrow-repeat"></i> RECARGAR</button>
            </div>
          </div>

          <div class="table-container">
            <table class="table table-sm table-hover align-middle mb-0" id="mainTable">
              <thead class="table-light" id="tableHead"></thead>
              <tbody id="tableBody"></tbody>
            </table>
          </div>

          <div class="d-flex justify-content-between align-items-center mt-3 flex-wrap gap-2">
            <button class="btn btn-sm btn-outline-success" id="btnAnterior">Anterior</button>
            <span id="infoPaginacion" class="small fw-bold">Página 1 de 1</span>
            <button class="btn btn-sm btn-outline-success" id="btnSiguiente">Siguiente</button>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="./assets/js/config.js"></script>
  <script src="./assets/js/state.js"></script>
  <script src="./assets/js/utils.js"></script>
  <script src="./assets/js/api.js"></script>
  <script src="./assets/js/logic.js"></script>
  <script src="./assets/js/ui.js"></script>
  <script src="./assets/js/app.js"></script>
</body>
</html>
